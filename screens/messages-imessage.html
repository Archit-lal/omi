<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>omi — Messages · iMessage</title>
<link rel="stylesheet" href="../design-system.css">
<style>
  .msg { flex:1; display:flex; min-width:0; }
  .threads { width:320px; flex:none; border-right:1px solid var(--hair); background:var(--soft); display:flex; flex-direction:column; min-height:0; }
  .threads .th-head { padding:16px 16px 10px; }
  .th-search { height:34px; border-radius:9px; background:var(--surface); border:1px solid var(--hair); display:flex; align-items:center; gap:8px; padding:0 11px; color:var(--faint); font-size:13px; }
  .th-tabs { display:flex; gap:4px; padding:0 12px 8px; }
  .th-tab { font-size:12px; color:var(--faint); padding:5px 10px; border-radius:7px; }
  .th-tab.on { color:var(--ink); background:var(--surface); box-shadow:inset 0 0 0 1px var(--hair); }
  .th-list { flex:1; overflow:auto; padding:4px 8px 12px; }
  .th-row { display:flex; gap:11px; padding:10px 10px; border-radius:11px; align-items:flex-start; position:relative; }
  .th-row:hover { background:var(--surface-2); }
  .th-row.active { background:var(--surface); box-shadow:inset 0 0 0 1px var(--hair); }
  .th-row .who { flex:1; min-width:0; }
  .th-row .nm { display:flex; align-items:center; gap:6px; font-size:14px; font-weight:540; color:var(--ink); }
  .th-row .pv { font-size:12.5px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }
  .th-row .tm { font-size:11px; color:var(--faint); flex:none; }
  .pdot { width:7px; height:7px; border-radius:50%; flex:none; }
  .avwrap { position:relative; flex:none; }
  .avwrap .pdot { position:absolute; right:-1px; bottom:-1px; border:2px solid var(--soft); width:11px; height:11px; }

  .thread { flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; }
  .thread .t-head { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--hair); }
  .thread .t-head .sub { font-size:12px; color:var(--faint); }
  .autoreply { margin-left:auto; display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--body); }
  .t-body { flex:1; overflow:auto; padding:22px 24px; display:flex; flex-direction:column; gap:14px; }
  .day-sep { text-align:center; font-size:11px; color:var(--faint); margin:4px 0; }
  .hold-banner { align-self:stretch; border:1px solid var(--hair); background:var(--surface-2); border-radius:13px; padding:13px 15px; }
  .hold-banner .hl { display:flex; align-items:center; gap:8px; }
  .composer { border-top:1px solid var(--hair); padding:14px 18px; background:var(--soft); }
  .draft-actions { display:flex; align-items:center; gap:8px; margin-top:11px; }
  .draft-actions .spacer{flex:1}
</style>
</head>
<body>
<div id="root"></div>
<script src="../common.js"></script>
<script>
const iBlue = '#0A84FF';
function row({fill,initials,name,preview,time,badge,dot,active}) {
  return `<div class="th-row ${active?'active':''}">
    <div class="avwrap"><div class="av sm ${fill}">${initials}</div>${dot?`<span class="pdot" style="background:${dot}"></span>`:''}</div>
    <div class="who">
      <div class="nm">${name}</div>
      <div class="pv">${preview}</div>
      ${badge?`<div style="margin-top:7px">${badge}</div>`:''}
    </div>
    <div class="tm">${time}</div>
  </div>`;
}
const list = [
  row({fill:'fill-blue',initials:'N',name:'Nick',preview:'blocked on your review — send the PR?',time:'9:48',dot:iBlue,active:true,
      badge:'<span class="badge draft"><span class="d"></span>Draft ready</span>'}),
  row({fill:'fill-slate',initials:'M',name:'Maher',preview:'You: grabbing groceries on the way back',time:'9:15',dot:iBlue,
      badge:'<span class="badge hold"><span class="d"></span>Auto-reply on</span>'}),
  row({fill:'fill-moss',initials:'A',name:'Allison',preview:'You: yes! Friday works for the dinner',time:'Tue',dot:iBlue,
      badge:'<span class="badge sent"><span class="d"></span>Sent by omi</span>'}),
  row({fill:'fill-teal',initials:'D',name:'David',preview:'the EMOTIV refund — want me to dispute?',time:'Tue',dot:iBlue,
      badge:'<span class="badge needs"><span class="d"></span>Needs you</span>'}),
  row({fill:'fill-clay',initials:'W',name:'Will',preview:'You: connecting you with the Clock Out lead',time:'Mon',dot:iBlue}),
  row({fill:'fill-ink',initials:'S',name:'Shristi',preview:'haha no worries, next time 🙌',time:'Sun',dot:iBlue}),
].join('');

const thread = `
  <div class="t-head">
    <div class="avwrap"><div class="av fill-blue">N</div><span class="pdot" style="background:${iBlue};position:absolute;right:-1px;bottom:-1px;border:2px solid var(--canvas);width:12px;height:12px"></span></div>
    <div><div class="h3">Nick</div><div class="sub">iMessage · Omi team</div></div>
    <label class="autoreply">Auto-reply <span class="switch"><i></i></span></label>
  </div>
  <div class="t-body">
    <div class="day-sep">Today</div>
    <div class="b-line"><div class="bubble in">did the auto-reply fix land? I'm blocked on my review</div></div>
    <div class="b-line out"><div class="bubble out">rebasing on main now — one sec</div></div>
    <div class="b-line"><div class="bubble in">🙏 drop the PR link when it's up</div></div>

    <div class="hold-banner">
      <div class="hl">${icon('cal','icon-sm')}<span class="h3">Tentative hold — walkthrough, today 4:00 PM</span></div>
      <div class="small" style="margin-top:6px;color:var(--muted)">You said you'd walk Nick through it before standup. I held 4pm on your calendar — nothing's sent yet.</div>
      <div class="row gap2" style="margin-top:11px">
        <button class="btn sm accent">${icon('check','icon-sm')} Confirm the hold</button>
        <button class="btn sm ghost">Drop it</button>
      </div>
    </div>
  </div>
  <div class="composer">
    <div class="draft-compose">
      <div class="lbl">${icon('ask','icon-sm')} Draft ready · from your GitHub tab + your standup note</div>
      <div class="txt">Here's the PR — rebased on main, summary's in the description. Want to hop on at 4 so I can walk you through it?</div>
      <div class="draft-actions">
        <button class="btn sm accent">${icon('send','icon-sm')} Send it</button>
        <button class="btn sm">Edit</button>
        <button class="btn sm ghost">Discard</button>
        <span class="spacer"></span>
        <span class="caption">You review every draft before it goes.</span>
      </div>
    </div>
  </div>`;

const body = `<div class="msg">
  <aside class="threads">
    <div class="th-head">
      <div class="between"><div class="h2">Messages</div><div class="live-dot amber" title="drafting"></div></div>
      <div class="th-search" style="margin-top:12px">${icon('search','icon-sm')} Search everyone</div>
    </div>
    <div class="th-tabs">
      <span class="th-tab on">All</span>
      <span class="th-tab">Needs you <span style="color:var(--warn)">·1</span></span>
      <span class="th-tab">Drafts <span style="color:var(--accent-strong)">·1</span></span>
    </div>
    <div class="th-list">${list}</div>
  </aside>
  <section class="thread">${thread}</section>
</div>`;

document.getElementById('root').innerHTML = windowShell({ active:'messages', title:'omi — Messages', presence:'amber', body });
</script>
<script src="../interactions.js"></script>
</body>
</html>
