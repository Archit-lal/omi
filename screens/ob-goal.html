<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>omi — One goal</title>
<link rel="stylesheet" href="../design-system.css">
<style>
  .ob { min-height:720px; display:flex; flex-direction:column; }
  .ob-top { display:flex; align-items:center; justify-content:space-between; padding:22px 30px; }
  .ob-mid { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px 40px; }
  .goal-col { width:540px; }
  .goals { display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
  .goal-chip { height:40px; padding:0 18px; font-size:14px; }
  .goal-chip.sel { background:var(--accent-tint); border-color:var(--accent); color:var(--accent-strong); font-weight:540; }
  .sg { display:flex; align-items:center; gap:12px; padding:14px 16px; border:1px solid var(--hair); border-radius:12px; background:var(--surface); margin-top:9px; }
  .sg .ic { color:var(--faint); }
  .sg:hover { background:var(--surface-2); }
  .skip { color: var(--faint); font-size:13px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="../common.js"></script>
<script>
function prog(cur){let s='';for(let k=1;k<=7;k++)s+=`<i class="${k<cur?'on':''} ${k===cur?'cur':''}"></i>`;return `<div class="prog">${s}</div>`;}

const body = `
<div class="ob">
  <div class="ob-top"><span class="wordmark" style="font-size:20px">omi</span>${prog(7)}<span class="skip"></span></div>
  <div class="ob-mid">
    <div class="goal-col">
      <div class="eyebrow">Last thing</div>
      <div class="display mt3" style="font-size:30px">Pick one thing to get<br>better at.</div>
      <div class="small mt2">I'll bias everything I do toward it.</div>
      <div class="goals">
        <span class="pill goal-chip">Ship faster</span>
        <span class="pill goal-chip sel">Stay on top of people</span>
        <span class="pill goal-chip">Protect deep work</span>
        <span class="pill goal-chip">Never drop a task</span>
      </div>

      <div class="h3 mt6">What do you want to ask me first?</div>
      <div class="sg">${icon('ask','icon')}<span class="body">What did I miss while I was heads-down today?</span></div>
      <div class="sg">${icon('users','icon')}<span class="body">Who am I overdue to reply to?</span></div>
      <div class="sg">${icon('cal','icon')}<span class="body">What's the one thing to finish before 5pm?</span></div>

      <div class="row gap3 mt6"><button class="btn accent lg" onclick="go('home')">Let's go</button></div>
    </div>
  </div>
</div>`;

document.getElementById('root').innerHTML = bareWindow({ title:'omi', presence:'live', body });
</script>
<script src="../interactions.js"></script>
</body>
</html>
