<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>omi — Sign in</title>
<link rel="stylesheet" href="../design-system.css">
<style>
  .signin-wrap { min-height: 720px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding: 60px; position:relative; }
  .signin-wrap::before { content:""; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(90% 60% at 50% 0%, rgba(224,168,46,0.06), transparent 60%); }
  .signin-mark { font-family: var(--serif); font-size: 72px; color: var(--ink); font-weight: 500; letter-spacing:-0.04em; line-height:1; }
  .signin-line { font-family: var(--serif); font-size: 22px; color: var(--body); margin-top: 22px; max-width: 380px; letter-spacing:-0.01em; }
  .apple-g { width:17px; height:17px; }
  .btn.auth { width: 300px; justify-content:center; gap:10px; }
  .g-mark { font-weight:700; font-family: var(--sans); font-size:15px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="../common.js"></script>
<script>
const body = `
<div class="signin-wrap">
  <div class="signin-mark">omi</div>
  <div class="signin-line">A second brain you trust more than your first.</div>

  <div class="stack gap3 mt7" style="align-items:center">
    <button class="btn primary lg auth" onclick="go('onboarding')">
      <svg class="apple-g" viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 12.6c0-2.2 1.8-3.3 1.9-3.4-1-1.5-2.6-1.7-3.2-1.7-1.4-.1-2.7.8-3.3.8-.7 0-1.7-.8-2.8-.8-1.5 0-2.8.8-3.6 2.2-1.5 2.6-.4 6.5 1.1 8.6.7 1 1.6 2.2 2.7 2.1 1.1 0 1.5-.7 2.8-.7s1.6.7 2.8.7c1.1 0 1.9-1 2.6-2 .8-1.2 1.2-2.3 1.2-2.4-.1 0-2.3-.9-2.3-3.5zM14.3 5.9c.6-.7 1-1.7.9-2.7-.9 0-1.9.6-2.5 1.3-.6.6-1 1.6-.9 2.6 1 .1 1.9-.5 2.5-1.2z"/></svg>
      Continue with Apple
    </button>
    <button class="btn lg auth" onclick="go('onboarding')">
      <span class="g-mark" style="color:#4285F4">G</span>
      Continue with Google
    </button>
  </div>

  <div class="caption mt6" style="display:flex;gap:8px;align-items:center">
    ${icon('code','icon-sm')} <a style="color:var(--muted)">Read the source code ↗</a>
  </div>
</div>`;

document.getElementById('root').innerHTML = bareWindow({ title:'omi', presence:'none', body });
</script>
<script src="../interactions.js"></script>
</body>
</html>
