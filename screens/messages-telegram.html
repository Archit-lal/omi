<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>omi — Messages · Telegram</title>
<link rel="stylesheet" href="../design-system.css">
<style>
  .msg { flex:1; display:flex; min-width:0; }
  .threads { width:320px; flex:none; border-right:1px solid var(--hair); background:var(--soft); display:flex; flex-direction:column; min-height:0; }
  .threads .th-head { padding:16px 16px 10px; }
  .th-search { height:34px; border-radius:9px; background:var(--surface); border:1px solid var(--hair); display:flex; align-items:center; gap:8px; padding:0 11px; color:var(--faint); font-size:13px; }
  .th-tabs { display:flex; gap:4px; padding:0 12px 8px; }
  .th-tab { font-size:12px; color:var(--faint); padding:5px 10px; border-radius:7px; }
  .th-tab.on { color:var(--ink); background:var(--surface); box-shadow:inset 0 0 0 1px var(--hair); }
  .th-list { flex:1; overflow:auto; padding:4px 8px 12px; }
  .th-row { display:flex; gap:11px; padding:10px 10px; border-radius:11px; align-items:flex-start; }
  .th-row:hover { background:var(--surface-2); }
  .th-row.active { background:var(--surface); box-shadow:inset 0 0 0 1px var(--hair); }
  .th-row .who { flex:1; min-width:0; }
  .th-row .nm { display:flex; align-items:center; gap:6px; font-size:14px; font-weight:540; color:var(--ink); }
  .th-row .pv { font-size:12.5px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }
  .th-row .tm { font-size:11px; color:var(--faint); flex:none; }
  .pdot { width:7px; height:7px; border-radius:50%; flex:none; }
  .avwrap { position:relative; flex:none; }
  .avwrap .pdot { position:absolute; right:-1px; bottom:-1px; border:2px solid var(--soft); width:11px; height:11px; }

  .thread { flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; }
  .thread .t-head { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--hair); }
  .thread .t-head .sub { font-size:12px; color:var(--faint); }
  .autoreply { margin-left:auto; display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--body); }
  .t-body { flex:1; overflow:auto; padding:22px 24px; display:flex; flex-direction:column; gap:14px; }
  .day-sep { text-align:center; font-size:11px; color:var(--faint); margin:4px 0; }

  /* the escalation — omi handing a decision back to you. Warn-toned, unmistakable. */
  .escalate { align-self:stretch; border:1px solid rgba(232,145,58,0.4); background:rgba(232,145,58,0.07); border-radius:15px; padding:18px 20px; }
  .escalate .eh { display:flex; align-items:center; gap:9px; }
  .escalate .eh .ic { color:var(--warn); }
  .escalate .eh .ti { font-size:15px; font-weight:560; color:var(--ink); }
  .escalate .rz { font-size:13.5px; color:var(--body); margin-top:8px; max-width:560px; }
  .opts { display:flex; flex-direction:column; gap:8px; margin-top:15px; }
  .opt { display:flex; align-items:center; gap:11px; padding:12px 14px; border:1px solid var(--hair); border-radius:11px; background:var(--surface); }
  .opt .ot { flex:1; }
  .opt .oq { font-size:11px; color:var(--faint); text-transform:uppercase; letter-spacing:0.08em; }
  .opt .od { font-size:14px; color:var(--ink); margin-top:2px; }
  .composer { border-top:1px solid var(--hair); padding:14px 18px; background:var(--soft); }
</style>
</head>
<body>
<div id="root"></div>
<script src="../common.js"></script>
<script>
const tg = '#2AABEE';
function row({fill,initials,name,preview,time,badge,active}) {
  return `<div class="th-row ${active?'active':''}">
    <div class="avwrap"><div class="av sm ${fill}">${initials}</div><span class="pdot" style="background:${tg}"></span></div>
    <div class="who">
      <div class="nm">${name}</div>
      <div class="pv">${preview}</div>
      ${badge?`<div style="margin-top:7px">${badge}</div>`:''}
    </div>
    <div class="tm">${time}</div>
  </div>`;
}
const list = [
  row({fill:'fill-slate',initials:'B',name:'Ben',preview:'coworking deposit — send your half today?',time:'11:04',active:true,
      badge:'<span class="badge needs"><span class="d"></span>Needs you</span>'}),
  row({fill:'fill-teal',initials:'A',name:'Allison',preview:'You: locked it in — see you Friday 🙌',time:'10:40',
      badge:'<span class="badge sent"><span class="d"></span>Sent by omi</span>'}),
  row({fill:'fill-blue',initials:'N',name:'Nick',preview:'You: rebasing on main now',time:'9:58',
      badge:'<span class="badge draft"><span class="d"></span>Draft ready</span>'}),
  row({fill:'fill-moss',initials:'OT',name:'Omi team',preview:'Josh: standup in 10 👋',time:'Tue',
      badge:'<span class="badge hold"><span class="d"></span>Auto-reply on</span>'}),
  row({fill:'fill-clay',initials:'A',name:'Aditya',preview:'You: haha yes let\'s do the dinner Friday',time:'Mon'}),
  row({fill:'fill-ink',initials:'D',name:'Drew',preview:'sent you the lead list 👍',time:'Sun'}),
].join('');

const thread = `
  <div class="t-head">
    <div class="avwrap"><div class="av fill-slate">B</div><span class="pdot" style="background:${tg};position:absolute;right:-1px;bottom:-1px;border:2px solid var(--canvas);width:12px;height:12px"></span></div>
    <div><div class="h3">Ben</div><div class="sub">Telegram · @ben</div></div>
    <label class="autoreply">Auto-reply <span class="switch"><i></i></span></label>
  </div>
  <div class="t-body">
    <div class="day-sep">Today</div>
    <div class="b-line"><div class="bubble in">the coworking space needs the deposit before they hold our desks</div></div>
    <div class="b-line"><div class="bubble in">can you send your half ($2,400) today? I'll cover the rest</div></div>

    <div class="escalate">
      <div class="eh">${icon('flag','icon')}<span class="ti">I didn't want to guess on this one.</span></div>
      <div class="rz">It's money and a same-day deadline — that's your call, not mine. I pulled the context so you can decide fast. Here's how I'd reply:</div>
      <div class="opts">
        <div class="opt">
          <div class="ot"><div class="oq">If yes</div><div class="od">"Sending my half now — done in a few minutes."</div></div>
          <button class="btn sm accent">Use this</button>
        </div>
        <div class="opt">
          <div class="ot"><div class="oq">If you need time</div><div class="od">"Can we do it tomorrow morning? Moving some cash around."</div></div>
          <button class="btn sm">Use this</button>
        </div>
        <div class="opt">
          <div class="ot"><div class="oq">Or</div><div class="od">Write it yourself — I'll stay out of it.</div></div>
          <button class="btn sm ghost">I've got it</button>
        </div>
      </div>
    </div>
  </div>
  <div class="composer">
    <div class="input"><span class="ph">Message Ben…</span><span class="kbd">↩</span></div>
  </div>`;

const body = `<div class="msg">
  <aside class="threads">
    <div class="th-head">
      <div class="between"><div class="h2">Messages</div><div class="live-dot amber" title="drafting"></div></div>
      <div class="th-search" style="margin-top:12px">${icon('search','icon-sm')} Search everyone</div>
    </div>
    <div class="th-tabs">
      <span class="th-tab">All</span>
      <span class="th-tab on">Needs you <span style="color:var(--warn)">·1</span></span>
      <span class="th-tab">Drafts <span style="color:var(--accent-strong)">·1</span></span>
    </div>
    <div class="th-list">${list}</div>
  </aside>
  <section class="thread">${thread}</section>
</div>`;

document.getElementById('root').innerHTML = windowShell({ active:'messages', title:'omi — Messages', presence:'amber', body });
</script>
<script src="../interactions.js"></script>
</body>
</html>
