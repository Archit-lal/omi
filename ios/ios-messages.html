<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>omi iOS — Messages</title>
<link rel="stylesheet" href="../design-system.css">
<link rel="stylesheet" href="ios.css">
<style>
  .mwrap { height:100%; display:flex; flex-direction:column; }
  .mhead { flex:none; border-bottom:1px solid var(--hair); padding:8px 18px 12px; background:var(--soft); }
  .mscroll { flex:1; overflow:auto; padding:16px 18px 8px; }
  .mcompose { flex:none; border-top:1px solid var(--hair); padding:12px 16px; background:var(--soft); }
</style>
</head>
<body>
<div id="root"></div>
<script src="../common.js"></script>
<script src="ios-frame.js"></script>
<script>
const app = `
<div class="mwrap">
  <div class="mhead">
    <div class="between">
      <div class="row gap2">${icon('chev','icon')}<span class="caption">3 need you</span></div>
      <div class="row gap2">
        <span class="caption">Auto-reply</span>
        <div class="switch on amber"><i></i></div>
      </div>
    </div>
    <div class="row gap3" style="margin-top:10px">
      <div class="av fill-slate">N</div>
      <div><div class="h3">Nick</div><div class="caption">Telegram · omi contributor</div></div>
    </div>
  </div>

  <div class="mscroll">
    <div class="b-line"><div class="bubble in m">yo did you push the PR? i'm blocked on your review 😅</div></div>
    <div class="b-meta">Today 8:51am</div>
    <div class="b-line out"><div class="bubble out m">one sec, rebasing it now</div></div>
    <div class="b-line"><div class="bubble in m">🙏 need it before standup</div></div>

    <!-- omi draft ready -->
    <div class="draft-compose" style="margin-top:20px">
      <div class="lbl">${icon('ask','icon-sm')} Draft ready — from your branch + the thread</div>
      <div class="txt">Just pushed — rebased on main, squashed the fixups. It's the durable-ingest + Telegram reply fix. Ready for review 🙏 github.com/omi/pull/8816</div>
      <div class="row gap2" style="margin-top:12px">
        <button class="btn accent sm" onclick="iosGo('ios-home')">${icon('send','icon-sm')} Send</button>
        <button class="btn sm">Edit</button>
        <button class="btn ghost sm">Discard</button>
      </div>
    </div>
  </div>

  <div class="mcompose">
    <div class="badge hold" style="margin-bottom:10px"><span class="d"></span> I held Wed 4pm for you two to sync on the launch — confirm?</div>
    <div class="m-ask" style="height:44px">${icon('plus','icon')}<span style="flex:1">Message</span>${icon('mic','icon')}</div>
  </div>
</div>`;

document.getElementById('root').innerHTML = phone({ app, tab:'messages' });
</script>
</body>
</html>
